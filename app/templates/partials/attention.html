{% if attention and attention.total %}
<div class="flash error">
  <b>⚠ Needs attention ({{ attention.total }})</b>
  <ul style="margin:8px 0 0 18px; padding:0">
    {% for item in attention['items'] %}
    <li style="margin-bottom:4px">
      {% if attention_links %}<a href="/manager/requests/{{ item.request_id }}">{{ item.label }}</a>
      {% else %}{{ item.label }}{% endif %}
      {% if item.detail %}<div class="muted" style="font-size:13px">{{ item.detail }}</div>{% endif %}
    </li>
    {% endfor %}
  </ul>
</div>
{% endif %}
